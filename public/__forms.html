<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="demo-request" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="demo-request" />
      <input name="bot-field" type="text" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="company" type="text" />
      <input name="projectType" type="text" />
      <input name="useCase" type="text" />
      <input name="marketData" type="text" />
      <input name="regulatedOutput" type="text" />
      <input name="orderExecution" type="text" />
      <input name="message" type="text" />
      <input name="complianceAcknowledgement" type="text" />
    </form>
  </body>
</html>
